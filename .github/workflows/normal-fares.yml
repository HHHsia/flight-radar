name: Normal Fares Scanner

# 航線清單須與 src/scripts/sync-tracked-destinations.ts、seed-tracked-destinations.ts 的列一致；
# 每次執行會先 npm run sync:tracked-destinations，再掃描下列啟用中的追蹤目的地。
#
# 目前追蹤（經濟艙、來回、TWD、zh-TW、max_stops=1）：
#   - tpe-tas-skd-bhk-rt-econ-202702  TPE -> TAS,SKD,BHK  去 2027-02-03～2027-02-04  回 2027-02-13～2027-02-14
#   - tpe-svo-dme-vko-rt-econ-202702  TPE -> SVO,DME,VKO  去 2027-02-03～2027-02-04  回 2027-02-13～2027-02-14
#   - tpe-oka-rt-econ-202612          TPE -> OKA         去 2026-12-24～2026-12-25  回 2026-12-27～2026-12-28
#
on:
  schedule:
    # 每 12 小時：UTC 00:00、12:00（台灣時間 08:00、20:00，全年 UTC+8）
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允許手動觸發

jobs:
  scan-normal-fares:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      NODE_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_AUTH_TOKEN: ${{ secrets.DATABASE_AUTH_TOKEN }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      RSS_FEED_URLS: ${{ secrets.RSS_FEED_URLS }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Sync tracked destinations (deactivate others, apply repo list)
        run: npm run sync:tracked-destinations

      - name: Run normal fares scanner
        run: npm run job:normal-fares
